name: Autofix

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  autofix:
    uses: bjmhe/workflows/.github/workflows/autofix-vp.yml@feat/release-vp
    permissions:
      contents: read
    with:
      command: vp check --fix && vp run build --update-snapshot
