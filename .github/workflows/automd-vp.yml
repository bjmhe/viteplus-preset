name: Automd Vite Plus

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: ["main"]

jobs:
  automd:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@6
        with:
          persist-credentials: false
          fetch-depth: "1"

      - name: Setup Vite Plus
        uses: sxzz/workflows/setup-vp@main
        with:
          node-version: 24

      - name: Automd
        run: vpx automd

      - uses: stefanzweifel/git-auto-commit-action@v7
